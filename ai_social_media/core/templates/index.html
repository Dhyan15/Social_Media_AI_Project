<!DOCTYPE html>
<html>
<head>
    <title>AI Social Media Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
        }

        input, select {
            padding: 10px;
            margin: 8px;
            width: 90%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            color: #38bdf8;
        }
    </style>
</head>

<body>

<h1>🚀 AI Social Media Assistant</h1>

<div class="container">

    <!-- 🔹 LEFT CARD (HASHTAG GENERATOR) -->
    <div class="card">
        <h2>🏷 Hashtag Generator</h2>

        <select id="category_left">
            <option value="travel">Travel</option>
            <option value="food">Food</option>
            <option value="fitness">Fitness</option>
        </select>

        <button onclick="getHashtags()">Generate</button>

        <p class="result" id="hashtag_result"></p>
    </div>

    <!-- 🔹 CENTER CARD (PREDICTION) -->
    <div class="card">
        <h2>📊 Performance Prediction</h2>

        <input type="number" placeholder="Follower Count" id="followers">
        <input type="number" placeholder="Caption Length" id="caption">
        <input type="number" placeholder="Hashtags Count" id="hashtags">
        <input type="number" placeholder="Post Hour (0-23)" id="hour">
        <input type="number" placeholder="CTA (0 or 1)" id="cta">

        <button onclick="predict()">Predict</button>

        <p class="result" id="result"></p>
    </div>

    <!-- 🔹 RIGHT CARD (CAPTION GENERATOR) -->
    <div class="card">
        <h2>✍ Caption Generator</h2>

        <select id="category_right">
            <option value="travel">Travel</option>
            <option value="food">Food</option>
            <option value="fitness">Fitness</option>
        </select>

        <button onclick="getCaption()">Generate</button>

        <p class="result" id="caption_result"></p>
    </div>

</div>

<script>
function predict() {
    fetch('/predict/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            follower_count: document.getElementById('followers').value,
            caption_length: document.getElementById('caption').value,
            hashtags_count: document.getElementById('hashtags').value,
            post_hour: document.getElementById('hour').value,
            has_call_to_action: document.getElementById('cta').value
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("Prediction:", data);
        document.getElementById('result').innerText =
            "📈 Prediction: " + data.prediction;
    });
}


function getCaption() {
    fetch('/ai-caption/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            category: document.getElementById('category_right').value
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("Caption API:", data);

        if (data.caption) {
            document.getElementById('caption_result').innerText = data.caption;
        } else {
            document.getElementById('caption_result').innerText =
                "⚠️ Error: " + data.error;
        }
    })
    .catch(err => console.error(err));
}


function getHashtags() {
    fetch('/ai-hashtags/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            category: document.getElementById('category_left').value
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("Hashtag API:", data);

        if (data.hashtags) {
            document.getElementById('hashtag_result').innerText = data.hashtags;
        } else {
            document.getElementById('hashtag_result').innerText =
                "⚠️ Error: " + data.error;
        }
    })
    .catch(err => console.error(err));
}
</script>

</body>
</html>
